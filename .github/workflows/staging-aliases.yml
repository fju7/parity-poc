name: Update staging aliases

on:
  push:
    branches: [staging]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for parity-poc Vercel build
        run: |
          echo "Waiting 2 minutes for Vercel to build parity-poc..."
          sleep 120

      - name: Find latest Ready deployment
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Use Vercel REST API to get the latest READY deployment from the
          # parity-poc project that was built from the STAGING branch.
          #
          # IMPORTANT: We filter by meta.githubCommitRef == "staging" because
          # without this filter, the query returns the most recent READY
          # deployment from ANY branch — which is almost always the production
          # deployment from main. That caused staging aliases to point at the
          # production build instead of the staging build, making staging
          # changes invisible.

          # Debug: show the 5 most recent parity-poc deployments with their branch
          echo "=== Recent parity-poc deployments ==="
          curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=5" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq '[.deployments[] | select(.name == "parity-poc")] | .[] | {url, state, readyState, branch: .meta.githubCommitRef}' \
            2>/dev/null || true

          # Get the latest READY deployment from parity-poc ON THE STAGING BRANCH
          URL=$(curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=20&state=READY" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '[.deployments[] | select(.name == "parity-poc" and .meta.githubCommitRef == "staging")] | .[0].url // empty')

          if [ -z "$URL" ]; then
            echo "ERROR: No Ready staging-branch deployment found for parity-poc"
            echo "This usually means Vercel cancelled the staging preview build."
            echo "Check Vercel dashboard > parity-poc > Settings > Git > Ignored Build Step"
            echo "=== All recent parity-poc deployments (any branch) ==="
            curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=10" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              | jq '[.deployments[] | select(.name == "parity-poc")] | .[] | {url, state, readyState, branch: .meta.githubCommitRef}'
            exit 1
          fi

          # Vercel API returns URL without https:// prefix
          FULL_URL="https://$URL"
          echo "url=$FULL_URL" >> "$GITHUB_OUTPUT"
          echo "Aliasing deployment: $FULL_URL"

      - name: Assign staging aliases
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest

          DEPLOYMENT="${{ steps.deploy.outputs.url }}"

          ALIASES=(
            "staging.civicscale.ai"
            "staging-signal.civicscale.ai"
            "staging-health.civicscale.ai"
            "staging-employer.civicscale.ai"
            "staging-broker.civicscale.ai"
            "staging-provider.civicscale.ai"
          )

          FAILED=0
          for ALIAS in "${ALIASES[@]}"; do
            echo -n "  $ALIAS ... "
            if vercel alias "$DEPLOYMENT" "$ALIAS" --token "$VERCEL_TOKEN" --scope fju7s-projects 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "$FAILED alias(es) failed"
            exit 1
          fi
          echo "All 6 staging aliases updated."
