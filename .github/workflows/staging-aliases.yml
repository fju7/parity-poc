name: Update staging aliases

on:
  push:
    branches: [staging]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for parity-poc Vercel build
        run: |
          echo "Waiting 2 minutes for Vercel to build parity-poc..."
          sleep 120

      - name: Debug — dump raw Vercel API response
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== RAW: first 10 parity-poc deployments (any state) ==="
          curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=30" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq '[.deployments[] | select(.name == "parity-poc")] | .[0:10] | .[] | {url, state, readyState, target, branch: .meta.githubCommitRef, sha: .meta.githubCommitSha[0:7], created: .created}'

          echo ""
          echo "=== RAW: first 10 READY parity-poc deployments ==="
          curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=30&state=READY" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq '[.deployments[] | select(.name == "parity-poc")] | .[0:10] | .[] | {url, state, readyState, target, branch: .meta.githubCommitRef, sha: .meta.githubCommitSha[0:7], created: .created}'

          echo ""
          echo "=== FILTERED: READY + staging branch only ==="
          RESULT=$(curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=30&state=READY" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq '[.deployments[] | select(.name == "parity-poc" and .meta.githubCommitRef == "staging")]')
          echo "$RESULT" | jq '.[0:5] | .[] | {url, sha: .meta.githubCommitSha[0:7], created: .created}'

          echo ""
          echo "=== SELECTED URL (what the alias step will use) ==="
          echo "$RESULT" | jq -r '.[0].url // "EMPTY — no staging deployment found"'

      - name: Find latest Ready deployment
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Get the latest READY deployment from parity-poc ON THE STAGING BRANCH
          URL=$(curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=30&state=READY" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '[.deployments[] | select(.name == "parity-poc" and .meta.githubCommitRef == "staging")] | .[0].url // empty')

          if [ -z "$URL" ]; then
            echo "ERROR: No Ready staging-branch deployment found for parity-poc"
            exit 1
          fi

          FULL_URL="https://$URL"
          echo "url=$FULL_URL" >> "$GITHUB_OUTPUT"
          echo "Aliasing deployment: $FULL_URL (from staging branch)"

      - name: Assign staging aliases
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest

          DEPLOYMENT="${{ steps.deploy.outputs.url }}"
          echo "DEPLOYMENT=$DEPLOYMENT"

          ALIASES=(
            "staging.civicscale.ai"
            "staging-signal.civicscale.ai"
            "staging-health.civicscale.ai"
            "staging-employer.civicscale.ai"
            "staging-broker.civicscale.ai"
            "staging-provider.civicscale.ai"
          )

          FAILED=0
          for ALIAS in "${ALIASES[@]}"; do
            echo -n "  $ALIAS ... "
            if vercel alias "$DEPLOYMENT" "$ALIAS" --token "$VERCEL_TOKEN" --scope fju7s-projects 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "$FAILED alias(es) failed"
            exit 1
          fi
          echo "All 6 staging aliases updated."
