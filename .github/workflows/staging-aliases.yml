name: Update staging aliases

on:
  push:
    branches: [staging]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook for parity-poc
        run: |
          echo "Triggering parity-poc deploy hook..."
          curl -s -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_reZ8AJpDu9N48j9Oko7JYLhyeR3r/EUKgQXefPO" \
            | jq . || true

      - name: Wait for Vercel build to complete
        run: |
          echo "Waiting 3 minutes for Vercel build..."
          sleep 180

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Get latest parity-poc staging deployment URL
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # List deployments for parity-poc project, find the most recent Ready Preview
          URL=$(vercel ls parity-poc --token "$VERCEL_TOKEN" --scope fju7s-projects 2>/dev/null \
            | grep "Ready" | grep "Preview" | head -1 | awk '{print $3}')

          if [ -z "$URL" ]; then
            echo "No ready preview deployment found for parity-poc"
            echo "Listing recent deployments for debugging:"
            vercel ls parity-poc --token "$VERCEL_TOKEN" --scope fju7s-projects 2>/dev/null | head -10
            exit 1
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Latest parity-poc staging deployment: $URL"

      - name: Assign staging aliases
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOYMENT="${{ steps.deploy.outputs.url }}"

          ALIASES=(
            "staging.civicscale.ai"
            "staging-signal.civicscale.ai"
            "staging-health.civicscale.ai"
            "staging-employer.civicscale.ai"
            "staging-broker.civicscale.ai"
            "staging-provider.civicscale.ai"
          )

          FAILED=0
          for ALIAS in "${ALIASES[@]}"; do
            echo -n "  $ALIAS ... "
            if vercel alias "$DEPLOYMENT" "$ALIAS" --token "$VERCEL_TOKEN" --scope fju7s-projects 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "$FAILED alias(es) failed"
            exit 1
          fi
          echo "All 6 staging aliases updated."
