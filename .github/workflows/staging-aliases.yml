name: Update staging aliases

on:
  push:
    branches: [staging]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for parity-poc-repo Vercel build
        run: |
          echo "Waiting 2 minutes for Vercel to build parity-poc-repo..."
          sleep 120

      - name: Find latest Ready deployment
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Use Vercel REST API to get latest deployments from parity-poc-repo.
          # parity-poc cancels preview builds; parity-poc-repo builds successfully.
          # Cross-project aliasing works because both are in the same Vercel team.

          # First, show the most recent deployment's full metadata for debugging
          echo "=== Most recent deployment metadata ==="
          curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=3" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq '[.deployments[] | select(.name == "parity-poc-repo")] | .[0] | {url, state, target, readyState, meta: .meta.githubCommitRef}' \
            2>/dev/null || true

          # Get the latest READY deployment from parity-poc-repo (any target type)
          URL=$(curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=20&state=READY" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '[.deployments[] | select(.name == "parity-poc-repo")] | .[0].url // empty')

          if [ -z "$URL" ]; then
            echo "ERROR: No Ready deployment found for parity-poc-repo"
            echo "=== All recent parity-poc-repo deployments ==="
            curl -s "https://api.vercel.com/v6/deployments?teamId=fju7s-projects&limit=10" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              | jq '[.deployments[] | select(.name == "parity-poc-repo")] | .[] | {url, state, target, readyState}'
            exit 1
          fi

          # Vercel API returns URL without https:// prefix
          FULL_URL="https://$URL"
          echo "url=$FULL_URL" >> "$GITHUB_OUTPUT"
          echo "Aliasing deployment: $FULL_URL"

      - name: Assign staging aliases
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest

          DEPLOYMENT="${{ steps.deploy.outputs.url }}"

          ALIASES=(
            "staging.civicscale.ai"
            "staging-signal.civicscale.ai"
            "staging-health.civicscale.ai"
            "staging-employer.civicscale.ai"
            "staging-broker.civicscale.ai"
            "staging-provider.civicscale.ai"
          )

          FAILED=0
          for ALIAS in "${ALIASES[@]}"; do
            echo -n "  $ALIAS ... "
            if vercel alias "$DEPLOYMENT" "$ALIAS" --token "$VERCEL_TOKEN" --scope fju7s-projects 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "$FAILED alias(es) failed"
            exit 1
          fi
          echo "All 6 staging aliases updated."
